name: "🐛 Bug Fix"
description: 버그 수정
title: "[FE] fix: "
labels: ["fix"]
body:
  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      placeholder: 어떤 문제인지 설명해주세요
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 재현 방법
      placeholder: |
        1. 어떤 페이지에서
        2. 어떤 동작을 하면
        3. 어떻게 잘못 동작함
    validations:
      required: false

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      placeholder: 올바르게 동작했을 때 어떤 결과여야 하는지
    validations:
      required: false
